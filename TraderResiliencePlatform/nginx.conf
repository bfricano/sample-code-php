server {
    listen 80;
    listen [::]:80;
    server_name regpe.com www.regpe.com;

    # Redirect all HTTP to HTTPS (activated after SSL is provisioned)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name regpe.com www.regpe.com;

    root /var/www/regpe/public;
    index index.php;

    # SSL — provisioned by Certbot; these paths are set automatically
    ssl_certificate     /etc/letsencrypt/live/regpe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/regpe.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header X-XSS-Protection       "1; mode=block"        always;
    add_header Referrer-Policy        "strict-origin"        always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Deny access to data directory (SQLite DB)
    location ~* ^/data/ {
        deny all;
        return 404;
    }

    # Static assets — aggressive cache
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All requests go through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.4-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   $realpath_root;

        # Timeouts for analytics endpoints
        fastcgi_read_timeout 60;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/regpe.access.log;
    error_log  /var/log/nginx/regpe.error.log;
}
